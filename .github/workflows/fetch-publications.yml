name: Fetch OpenReview Publications

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fetch-publications:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Refreshes index.html + data/publications.json.
      # Non-destructive: only writes when >= 1 publication is fetched; otherwise it keeps
      # the existing curated data. Uses a Bearer token if OPENREVIEW_USERNAME/PASSWORD
      # secrets are set (OpenReview now blocks anonymous note queries with a 403 challenge).
      - name: Fetch publications (non-destructive)
        env:
          OPENREVIEW_USERNAME: ${{ secrets.OPENREVIEW_USERNAME }}
          OPENREVIEW_PASSWORD: ${{ secrets.OPENREVIEW_PASSWORD }}
        run: node scripts/fetch-publications.mjs

      - name: Commit and push if changed
        run: |
          git config --local user.email "tiangong1337@outlook.com"
          git config --local user.name "KO Ho Tin"
          git add index.html data/publications.json

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔄 Auto-update publications data [skip ci]"
            git push
            echo "✅ Publications data updated in index.html and data/publications.json"
          fi
